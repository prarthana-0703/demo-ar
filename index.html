<!DOCTYPE html>
<html>

<head>
    <title>AR Wedding Invitation</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>

    <script>
        AFRAME.registerComponent('music-button', {
            init: function () {
                const music = document.querySelector("#wedding-music");
                this.el.addEventListener("click", () => {
                    if (music.paused) {
                        music.play().catch(err => console.log("Playback blocked"));
                    } else {
                        music.pause();
                    }
                });
            }
        });
    </script>
</head>

<body>
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <video id="wedding-video" src="GIF_Video_Generation_Successful.mp4" loop muted playsinline webkit-playsinline></video>
            <img id="music-icon" src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
        </a-assets>

        <audio id="wedding-music" src="wedding-music.mp3" preload="auto"></audio>

        <a-marker preset="hiro">

            <a-text 
                value="Prarthana & Rahul" 
                position="0 0.8 -1.0" 
                align="center" 
                color="#FFD700" 
                scale="1.2 1.2 1.2" 
                rotation="-90 0 0">
            </a-text>

            <a-video 
                src="#wedding-video" 
                position="0 0.1 0" 
                rotation="-90 0 0" 
                width="2.2" 
                height="1.3">
            </a-video>

            <a-image 
                src="#music-icon" 
                class="clickable" 
                music-button 
                position="0.9 0.2 0.5" 
                rotation="-90 0 0" 
                width="0.4" 
                height="0.4"
                animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; dur: 1000; loop: true">
            </a-image>

            <a-text 
                value="25 December 2026" 
                position="0 0.1 1.0" 
                align="center" 
                color="white" 
                scale="0.8 0.8 0.8" 
                rotation="-90 0 0">
            </a-text>

        </a-marker>

        <a-entity camera>
            <a-cursor fuse="false" raycaster="objects: .clickable" color="yellow"></a-cursor>
        </a-entity>

    </a-scene>
</body>
</html>
