<!DOCTYPE html>
<html>
<head>
  <title>AR Wedding Invitation</title>

  <!-- A-Frame & AR.js -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>

  <script>
    AFRAME.registerComponent('marker-video', {
      init: function () {
        const video = document.querySelector('#wedding-video');
        this.el.addEventListener('markerFound', () => video.play());
        this.el.addEventListener('markerLost', () => video.pause());
      }
    });

    document.addEventListener("DOMContentLoaded", function () {

      const video = document.querySelector('#wedding-video');
      const music = document.querySelector('#bg-music');

      document.querySelector('#unmuteBtn')
        .addEventListener('click', function () {
          video.muted = false;
          video.play();
          music.play();
        });

      document.querySelector('#musicBtn')
        .addEventListener('click', function () {
          music.paused ? music.play() : music.pause();
        });

      document.querySelector('#navBtn')
        .addEventListener('click', function () {
          window.location.href = 'navigation.html';
        });

    });
  </script>
</head>

<body>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="wedding-music.mp3" type="audio/mpeg">
  </audio>

  <a-scene
    embedded
    renderer="alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled:false">

    <a-assets>
      <video
        id="wedding-video"
        src="GIF_Video_Generation_Successful.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-marker preset="hiro" marker-video>

      <!-- VIDEO -->
      <a-video
        src="#wedding-video"
        position="0 0.8 0"
        rotation="-90 0 0"
        width="1.8"
        height="1.0">
      </a-video>

      <!-- 3D BUTTONS BELOW VIDEO -->

      <!-- UNMUTE -->
      <a-box
        id="unmuteBtn"
        class="clickable"
        position="-0.8 0.8 0.7"
        rotation="-90 0 0"
        depth="0.15"
        height="0.25"
        width="0.6"
        color="#d4af37">

        <a-text value="Unmute"
          align="center"
          color="white"
          position="0 0 0.09"
          scale="0.6 0.6 0.6">
        </a-text>
      </a-box>

      <!-- MUSIC -->
      <a-box
        id="musicBtn"
        class="clickable"
        position="0 0.8 0.7"
        rotation="-90 0 0"
        depth="0.15"
        height="0.25"
        width="0.6"
        color="#d4af37">

        <a-text value="Music"
          align="center"
          color="white"
          position="0 0 0.09"
          scale="0.6 0.6 0.6">
        </a-text>
      </a-box>

      <!-- NAVIGATION -->
      <a-box
        id="navBtn"
        class="clickable"
        position="0.8 0.8 0.7"
        rotation="-90 0 0"
        depth="0.15"
        height="0.25"
        width="0.7"
        color="#d4af37">

        <a-text value="Navigate"
          align="center"
          color="white"
          position="0 0 0.09"
          scale="0.6 0.6 0.6">
        </a-text>
      </a-box>

    </a-marker>

    <!-- CAMERA WITH FUSE CLICK (MOBILE SUPPORT) -->
    <a-camera>
      <a-cursor
        fuse="true"
        fuse-timeout="800"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-camera>

  </a-scene>

</body>
</html>
