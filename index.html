<!DOCTYPE html>
<html>
<head>
<title>AR Blessing Wall</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#blessingPanel{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
z-index:10;
}

#blessingInput{
padding:8px;
width:200px;
border-radius:6px;
border:1px solid #ccc;
}

#sendBtn{
padding:8px;
background:gold;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDJ17F9vJKFy329miOBgRpeR8WxV7wT_8g",
authDomain: "ar-invitation-card.firebaseapp.com",
projectId: "ar-invitation-card",
storageBucket: "ar-invitation-card.firebasestorage.app",
messagingSenderId: "320155677687",
appId: "1:320155677687:web:53df247453350de0b834f2",
measurementId: "G-RY3R2ZDPJ0",
databaseURL:"https://ar-invitation-card-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* Send blessing */

window.sendBlessing=function(){

const text=document.getElementById("blessingInput").value;

if(text.trim()=="") return;

push(ref(db,"blessings"),{
message:text,
time:Date.now()
});

document.getElementById("blessingInput").value="";

};


/* Listen for new blessings */

onChildAdded(ref(db,"blessings"),(snapshot)=>{

const data=snapshot.val();

createBlessing(data.message);

});


/* Create AR blessing */

function createBlessing(text){

const marker=document.querySelector("#marker");

const blessing=document.createElement("a-entity");

const x=(Math.random()*2)-1;
const z=(Math.random()*2)-1.5;

blessing.setAttribute("position",`${x} 0.3 ${z}`);

const heart=document.createElement("a-sphere");

heart.setAttribute("radius","0.1");
heart.setAttribute("color","#ff4d6d");

heart.setAttribute("animation",
"property: position; to: 0 1.6 0; dur:4000; easing:easeOutQuad");

const message=document.createElement("a-text");

message.setAttribute("value",text);
message.setAttribute("align","center");
message.setAttribute("color","#FFD700");
message.setAttribute("rotation","-90 0 0");
message.setAttribute("scale","0.7 0.7 0.7");
message.setAttribute("position","0 0.25 0");

blessing.appendChild(heart);
blessing.appendChild(message);

marker.appendChild(blessing);

/* auto remove */

setTimeout(()=>{
if(blessing.parentNode){
blessing.parentNode.removeChild(blessing);
}
},10000);

}

</script>

</head>

<body>

<div id="blessingPanel">

<input id="blessingInput"
placeholder="Send your blessing ❤️">

<button id="sendBtn"
onclick="sendBlessing()">
Send Blessing
</button>

</div>


<a-scene
embedded
arjs="sourceType:webcam;debugUIEnabled:false"
cursor="rayOrigin: mouse"
raycaster="objects: .clickable">


<a-marker preset="hiro" id="marker">

<a-plane
position="0 0.05 0"
rotation="-90 0 0"
width="2.5"
height="2.5"
color="#000"
opacity="0.5">
</a-plane>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
