```html
<!DOCTYPE html>
<html>
<head>
<title>Premium AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

<script>

// MUSIC BUTTON LOGIC
AFRAME.registerComponent('music-button', {
init: function () {

const music = document.querySelector("#wedding-music");

this.el.addEventListener("click", () => {

if (music.paused){
music.play();
this.el.setAttribute("scale","0.6 0.6 0.6");
}
else{
music.pause();
this.el.setAttribute("scale","0.5 0.5 0.5");
}

});

}
});

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType:webcam;debugUIEnabled:false;"
cursor="rayOrigin: mouse"
raycaster="objects: .clickable">

<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>

<img
id="music-icon"
src="https://cdn-icons-png.flaticon.com/512/727/727245.png">

</a-assets>

<audio id="wedding-music" src="wedding-music.mp3" preload="auto"></audio>


<a-marker preset="hiro">

<!-- Background Card -->

<a-plane
position="0 0.05 0"
rotation="-90 0 0"
width="2.8"
height="3.2"
color="#000"
opacity="0.45"
material="transparent:true">
</a-plane>


<!-- Gold Frame -->

<a-plane
position="0 0.1 0"
rotation="-90 0 0"
width="2.4"
height="1.5"
material="color:#FFD700;wireframe:true">
</a-plane>


<!-- 3D COUPLE NAME -->

<a-text
value="Prarthana & Rahul"
position="0 0.2 -1.1"
align="center"
color="#5c3b00"
scale="1.6 1.6 1.6"
rotation="-90 0 0">
</a-text>

<a-text
value="Prarthana & Rahul"
position="0 0.22 -1.08"
align="center"
color="#FFD700"
scale="1.6 1.6 1.6"
rotation="-90 0 0">
</a-text>


<!-- VIDEO -->

<a-video
src="#wedding-video"
position="0 0.1 0"
rotation="-90 0 0"
width="2.2"
height="1.3">
</a-video>


<!-- MUSIC BUTTON -->

<a-image
src="#music-icon"
class="clickable"
music-button
position="1.0 0.2 0.8"
rotation="-90 0 0"
width="0.5"
height="0.5"
animation="property: scale; to: 0.6 0.6 0.6; dir: alternate; dur: 900; loop: true">
</a-image>


<!-- SAVE THE DATE -->

<a-text
value="SAVE THE DATE"
position="0 0.2 1.1"
align="center"
color="#FFD700"
scale="0.7 0.7 0.7"
rotation="-90 0 0">
</a-text>


<!-- 3D DATE -->

<a-text
value="25 December 2026"
position="0 0.2 1.38"
align="center"
color="#444"
scale="1 1 1"
rotation="-90 0 0">
</a-text>

<a-text
value="25 December 2026"
position="0 0.22 1.36"
align="center"
color="white"
scale="1 1 1"
rotation="-90 0 0">
</a-text>


</a-marker>


<a-entity camera>
<a-cursor
fuse="false"
raycaster="objects: .clickable"
color="#FFD700"
scale="1.5 1.5 1.5">
</a-cursor>
</a-entity>

</a-scene>

</body>
</html>
```
