<!DOCTYPE html>
<html>
<head>
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

<script>

// Button interaction logic
AFRAME.registerComponent('button-logic', {
init:function(){

const video=document.querySelector('#wedding-video');
const music=document.querySelector('#bg-music');
const el=this.el;

function handlePress(){

const id=el.getAttribute('id');

if(id==="unmuteBtn"){
video.muted=false;
video.play();
music.play();
}

if(id==="musicBtn"){
if(music.paused){
music.play();
}else{
music.pause();
}
}

if(id==="navBtn"){
window.location.href="navigation.html";
}

if(id==="rsvpBtn"){
window.open("https://forms.gle/YOUR_FORM_LINK");
}

if(id==="galleryBtn"){
window.location.href="gallery.html";
}

}

el.addEventListener('click',handlePress);
el.addEventListener('touchstart',handlePress);

}
});


// marker handler
AFRAME.registerComponent('marker-handler',{
init:function(){

const video=document.querySelector("#wedding-video");

this.el.addEventListener("markerFound",()=>{
video.play();
});

this.el.addEventListener("markerLost",()=>{
video.pause();
});

}
});


// Countdown timer
window.onload=function(){

const weddingDate = new Date("Dec 25, 2026 18:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();
const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));

const countdown=document.querySelector("#countdown");

if(countdown){
countdown.setAttribute("value",days+" Days To Wedding");
}

},1000);

};

</script>

</head>

<body>

<audio id="bg-music" loop>
<source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<a-scene
embedded
arjs="sourceType:webcam;debugUIEnabled:false;"
vr-mode-ui="enabled:false">

<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
preload="auto"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

</a-assets>


<a-marker preset="hiro" marker-handler>

<!-- Couple Names -->

<a-text
value="Prarthana & Rahul"
position="0 1.8 0"
align="center"
color="#FFD700"
scale="1 1 1">
</a-text>

<!-- Wedding Date -->

<a-text
value="25 December 2026"
position="0 1.6 0"
align="center"
color="white"
scale="0.8 0.8 0.8">
</a-text>

<!-- Countdown -->

<a-text
id="countdown"
value="Loading..."
position="0 2 0"
align="center"
color="#ff69b4"
scale="0.8 0.8 0.8">
</a-text>


<!-- Video -->

<a-video
src="#wedding-video"
position="0 0.8 0"
rotation="-90 0 0"
width="1.8"
height="1.0">
</a-video>


<!-- UNMUTE BUTTON -->

<a-box
id="unmuteBtn"
button-logic
position="-1.5 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.6"
color="#d4af37">

<a-text
value="Unmute"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- MUSIC BUTTON -->

<a-box
id="musicBtn"
button-logic
position="-0.5 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.6"
color="#d4af37">

<a-text
value="Music"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- NAVIGATION BUTTON -->

<a-box
id="navBtn"
button-logic
position="0.5 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.7"
color="#d4af37">

<a-text
value="Navigate"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- RSVP BUTTON -->

<a-box
id="rsvpBtn"
button-logic
position="1.5 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.6"
color="#ff69b4">

<a-text
value="RSVP"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- GALLERY BUTTON -->

<a-box
id="galleryBtn"
button-logic
position="2.5 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.7"
color="#9370DB">

<a-text
value="Gallery"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- Confetti effect -->

<a-entity
particle-system="
preset:snow;
particleCount:150;
color:#ff69b4,#ffffff,#ffd700">
</a-entity>


</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
