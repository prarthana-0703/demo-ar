<!DOCTYPE html>
<html>
<head>

<title>AR Blessing Wall</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

/* Blessing Panel */

#blessingPanel{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:18px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,0.35);
display:flex;
flex-direction:column;
gap:10px;
width:85%;
max-width:320px;
}

/* Input */

#blessingInput{
padding:10px;
border-radius:12px;
border:none;
outline:none;
font-size:14px;
background:white;
}

/* Button */

#sendBtn{
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#FFD700,#FFC107);
font-weight:bold;
cursor:pointer;
}

/* Floating heart */

.heart{
position:absolute;
font-size:22px;
animation:floatHeart 2s ease-out forwards;
}

@keyframes floatHeart{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120px);opacity:0;}
}

</style>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyDJ17F9vJKFy329miOBgRpeR8WxV7wT_8g",
authDomain: "ar-invitation-card.firebaseapp.com",
projectId: "ar-invitation-card",
storageBucket: "ar-invitation-card.firebasestorage.app",
messagingSenderId: "320155677687",
appId: "1:320155677687:web:53df247453350de0b834f2",
measurementId: "G-RY3R2ZDPJ0",
databaseURL: "https://ar-invitation-card-default-rtdb.asia-southeast1.firebasedatabase.app"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* Send blessing */

window.sendBlessing=function(){

const text=document.getElementById("blessingInput").value;

if(text.trim()=="") return;

push(ref(db,"blessings"),{
message:text,
time:Date.now()
});

createHeart();

document.getElementById("blessingInput").value="";
};


/* Listen for new blessings */

onChildAdded(ref(db,"blessings"),(snapshot)=>{

const data=snapshot.val();
createBlessing(data.message);

});


/* Create AR message box */

function createBlessing(text){

const marker=document.querySelector("#marker");

const blessing=document.createElement("a-entity");

const x=(Math.random()*2)-1;
const z=(Math.random()*2)-1.5;

blessing.setAttribute("position",`${x} 0.3 ${z}`);

const box=document.createElement("a-plane");

box.setAttribute("width","1.6");
box.setAttribute("height","0.5");
box.setAttribute("color","#ffffff");
box.setAttribute("opacity","0.95");
box.setAttribute("rotation","-90 0 0");

box.setAttribute("animation",
"property: position; to: 0 1.6 0; dur:5000; easing:easeOutQuad");

const message=document.createElement("a-text");

message.setAttribute("value",text);
message.setAttribute("align","center");
message.setAttribute("color","#000");
message.setAttribute("scale","0.7 0.7 0.7");
message.setAttribute("rotation","-90 0 0");
message.setAttribute("position","0 0.02 0.01");

box.appendChild(message);
blessing.appendChild(box);
marker.appendChild(blessing);

/* remove after 10 sec */

setTimeout(()=>{
if(blessing.parentNode){
blessing.parentNode.removeChild(blessing);
}
},10000);

}


/* heart animation */

function createHeart(){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left="50%";
heart.style.bottom="120px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

</script>

</head>

<body>


<div id="blessingPanel">

<input id="blessingInput"
placeholder="Write your blessing ✨">

<button id="sendBtn" onclick="sendBlessing()">
Send Blessing
</button>

</div>


<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType:webcam;debugUIEnabled:false">

<a-marker preset="hiro" id="marker">

<a-plane
position="0 0.05 0"
rotation="-90 0 0"
width="2.5"
height="2.5"
color="#000"
opacity="0.5">
</a-plane>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
