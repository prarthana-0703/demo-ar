<!DOCTYPE html>
<html>
<head>
<title>Premium AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

/* Blessing input panel */

#blessingPanel{

position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
z-index:10;

}

#blessingInput{

padding:8px;
width:200px;
border-radius:6px;
border:1px solid #ccc;

}

#sendBtn{

padding:8px;
background:gold;
border:none;
border-radius:6px;
cursor:pointer;

}

</style>

<script>

/* Music button */

AFRAME.registerComponent('music-button',{
init:function(){

const music=document.querySelector("#wedding-music");

this.el.addEventListener("click",()=>{

if(music.paused){
music.play();
}
else{
music.pause();
}

});

}
});


/* Blessing system */

function spawnBlessing(){

const text=document.getElementById("blessingInput").value;

if(text.trim()==""){
alert("Please write a blessing ❤️");
return;
}

const marker=document.querySelector("#marker");

const blessing=document.createElement("a-entity");

const x=(Math.random()*2)-1;
const z=(Math.random()*2)-1;

blessing.setAttribute("position",x+" 0.4 "+z);


/* heart */

const heart=document.createElement("a-sphere");

heart.setAttribute("radius","0.12");
heart.setAttribute("color","#ff4d6d");

heart.setAttribute("animation",
"property: position; to: "+x+" 1.8 "+z+"; dur:4000; easing:linear");


/* message */

const message=document.createElement("a-text");

message.setAttribute("value",text);
message.setAttribute("align","center");
message.setAttribute("color","#FFD700");
message.setAttribute("scale","0.6 0.6 0.6");
message.setAttribute("rotation","-90 0 0");
message.setAttribute("position","0 0.25 0");


blessing.appendChild(heart);
blessing.appendChild(message);

marker.appendChild(blessing);


/* clear input */

document.getElementById("blessingInput").value="";

}

</script>

</head>

<body>


<!-- Blessing UI -->

<div id="blessingPanel">

<input id="blessingInput"
placeholder="Send your blessing ❤️">

<button id="sendBtn"
onclick="spawnBlessing()">

Send Blessing

</button>

</div>


<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType:webcam;debugUIEnabled:false"
cursor="rayOrigin: mouse"
raycaster="objects: .clickable">


<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>


<img
id="music-icon"
src="https://cdn-icons-png.flaticon.com/512/727/727245.png">

</a-assets>


<audio id="wedding-music" src="wedding-music.mp3"></audio>


<a-marker preset="hiro" id="marker">


<!-- Background card -->

<a-plane
position="0 0.05 0"
rotation="-90 0 0"
width="2.6"
height="3"
color="#000"
opacity="0.45"
material="transparent:true">
</a-plane>


<!-- Gold frame -->

<a-plane
position="0 0.1 0"
rotation="-90 0 0"
width="2.3"
height="1.4"
material="color:#FFD700;wireframe:true">
</a-plane>


<!-- Couple name -->

<a-text
value="Prarthana & Rahul"
position="0 0.22 -1.1"
align="center"
color="#FFD700"
scale="1.6 1.6 1.6"
rotation="-90 0 0">
</a-text>

<a-text
value="Prarthana & Rahul"
position="0.02 0.20 -1.12"
align="center"
color="#5c3b00"
scale="1.6 1.6 1.6"
rotation="-90 0 0">
</a-text>


<!-- Wedding Video -->

<a-video
src="#wedding-video"
position="0 0.1 0"
rotation="-90 0 0"
width="2.2"
height="1.3">
</a-video>


<!-- Music Button -->

<a-image
src="#music-icon"
class="clickable"
music-button
position="1.0 0.2 0.8"
rotation="-90 0 0"
width="0.5"
height="0.5">
</a-image>


<!-- Save the Date -->

<a-text
value="SAVE THE DATE"
position="0 0.2 1.1"
align="center"
color="#FFD700"
scale="0.7 0.7 0.7"
rotation="-90 0 0">
</a-text>


<!-- Date -->

<a-text
value="25 December 2026"
position="0 0.22 1.36"
align="center"
color="white"
scale="1 1 1"
rotation="-90 0 0">
</a-text>

<a-text
value="25 December 2026"
position="0.02 0.20 1.34"
align="center"
color="#444"
scale="1 1 1"
rotation="-90 0 0">
</a-text>


</a-marker>


<a-entity camera></a-entity>

</a-scene>

</body>
</html>
