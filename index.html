<!DOCTYPE html>
<html>
<head>
    <title>AR Horizontal Sliding Gallery</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="photo1" src="Screenshot 2026-03-12 001948.png"> 
            <img id="photo2" src="Screenshot 2026-03-12 003337.png">
            <img id="photo3" src="couple3.jpg">
            <img id="photo4" src="couple4.jpg">
        </a-assets>

        <a-marker preset="hiro">
            
            <a-text value="Our Journey" position="0 0.5 -1.5" align="center" color="#FFD700" rotation="-90 0 0" scale="1.2 1.2 1.2"></a-text>

            <a-entity id="gallery-container" 
                      position="0 0.1 0" 
                      animation="property: position; from: 1.5 0.1 0; to: -1.5 0.1 0; dur: 8000; dir: alternate; loop: true; easing: linear">
                
                <a-image src="#photo1" position="-1.5 0 0" rotation="-90 0 0" width="1.2" height="1.6">
                    <a-plane color="#FFD700" width="1.25" height="1.65" position="0 0 -0.01"></a-plane>
                </a-image>

                <a-image src="#photo2" position="0 0 0" rotation="-90 0 0" width="1.2" height="1.6">
                    <a-plane color="#FFD700" width="1.25" height="1.65" position="0 0 -0.01"></a-plane>
                </a-image>

                <a-image src="#photo3" position="1.5 0 0" rotation="-90 0 0" width="1.2" height="1.6">
                    <a-plane color="#FFD700" width="1.25" height="1.65" position="0 0 -0.01"></a-plane>
                </a-image>

                <a-image src="#photo4" position="3.0 0 0" rotation="-90 0 0" width="1.2" height="1.6">
                    <a-plane color="#FFD700" width="1.25" height="1.65" position="0 0 -0.01"></a-plane>
                </a-image>

            </a-entity>

            <a-plane position="0 0 0" rotation="-90 0 0" width="4" height="3" color="#000" opacity="0.2"></a-plane>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
