<!DOCTYPE html>
<html>
<head>
  <title>AR Wedding Invitation</title>

  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>

  <script>
    // This component handles the actual clicks on the 3D objects
    AFRAME.registerComponent('button-logic', {
      init: function () {
        const el = this.el;
        const video = document.querySelector('#wedding-video');
        const music = document.querySelector('#bg-music');

        el.addEventListener('click', function () {
          // Identify which button was clicked by its ID
          const id = el.getAttribute('id');

          if (id === 'unmuteBtn') {
            video.muted = false;
            video.play();
            music.play();
          } else if (id === 'musicBtn') {
            if (music.paused) {
              music.play();
            } else {
              music.pause();
            }
          } else if (id === 'navBtn') {
            // This is the direct redirection to your navigation page
            window.location.href = 'navigation.html';
          }
        });
      }
    });

    // Control video playback based on marker visibility
    AFRAME.registerComponent('marker-handler', {
      init: function () {
        const video = document.querySelector('#wedding-video');
        this.el.addEventListener('markerFound', () => video.play());
        this.el.addEventListener('markerLost', () => video.pause());
      }
    });
  </script>
</head>

<body>

  <audio id="bg-music" loop>
    <source src="wedding-music.mp3" type="audio/mpeg">
  </audio>

  <a-scene
    embedded
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled:false">

    <a-assets>
      <video
        id="wedding-video"
        src="GIF_Video_Generation_Successful.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-marker preset="hiro" marker-handler>

      <a-video
        src="#wedding-video"
        position="0 0.8 0"
        rotation="-90 0 0"
        width="1.8"
        height="1.0">
      </a-video>

      <a-box
        id="unmuteBtn"
        class="clickable"
        button-logic
        position="-0.8 0.8 0.8"
        rotation="-90 0 0"
        depth="0.1" height="0.3" width="0.6"
        color="#d4af37">
        <a-text value="Unmute" align="center" position="0 0 0.06" scale="0.4 0.4 0.4"></a-text>
      </a-box>

      <a-box
        id="musicBtn"
        class="clickable"
        button-logic
        position="0 0.8 0.8"
        rotation="-90 0 0"
        depth="0.1" height="0.3" width="0.6"
        color="#d4af37">
        <a-text value="Music" align="center" position="0 0 0.06" scale="0.4 0.4 0.4"></a-text>
      </a-box>

      <a-box
        id="navBtn"
        class="clickable"
        button-logic
        position="0.8 0.8 0.8"
        rotation="-90 0 0"
        depth="0.1" height="0.3" width="0.7"
        color="#d4af37">
        <a-text value="Navigate" align="center" position="0 0 0.06" scale="0.4 0.4 0.4"></a-text>
      </a-box>

    </a-marker>

    <a-entity camera>
      <a-entity cursor="fuse: true; fuseTimeout: 1000"
                position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                material="color: white; shader: flat"
                raycaster="objects: .clickable">
      </a-entity>
    </a-entity>

  </a-scene>

</body>
</html>
