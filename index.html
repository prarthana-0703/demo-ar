<!DOCTYPE html>
<html>
<head>
<title>Premium AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

<script>

AFRAME.registerComponent('music-button',{
init:function(){

const music=document.querySelector("#wedding-music");

this.el.addEventListener("click",()=>{

if(music.paused){
music.play();
}
else{
music.pause();
}

});

}
});

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType:webcam;debugUIEnabled:false"
cursor="rayOrigin: mouse"
raycaster="objects: .clickable">

<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>

<img
id="music-icon"
src="https://cdn-icons-png.flaticon.com/512/727/727245.png">

</a-assets>

<audio id="wedding-music" src="wedding-music.mp3"></audio>


<a-marker preset="hiro">

<!-- Background card -->

<a-plane
position="0 0.05 0"
rotation="-90 0 0"
width="2.6"
height="3"
color="#000"
opacity="0.45"
material="transparent:true">
</a-plane>


<!-- Gold frame -->

<a-plane
position="0 0.1 0"
rotation="-90 0 0"
width="2.3"
height="1.4"
material="color:#FFD700;wireframe:true">
</a-plane>


<!-- 3D Couple Name (no movement) -->

<a-text
value="Prarthana & Rahul"
position="0 0.22 -1.1"
align="center"
color="#FFD700"
scale="1.6 1.6 1.6"
rotation="-90 0 0">
</a-text>

<a-text
value="Prarthana & Rahul"
position="0.02 0.20 -1.12"
align="center"
color="#5c3b00"
scale="1.6 1.6 1.6"
rotation="-90 0 0">
</a-text>


<!-- Wedding Video -->

<a-video
src="#wedding-video"
position="0 0.1 0"
rotation="-90 0 0"
width="2.2"
height="1.3">
</a-video>


<!-- Music Button -->

<a-image
src="#music-icon"
class="clickable"
music-button
position="1.0 0.2 0.8"
rotation="-90 0 0"
width="0.5"
height="0.5">
</a-image>


<!-- Save the Date -->

<a-text
value="SAVE THE DATE"
position="0 0.2 1.1"
align="center"
color="#FFD700"
scale="0.7 0.7 0.7"
rotation="-90 0 0">
</a-text>


<!-- 3D Date -->

<a-text
value="25 December 2026"
position="0 0.22 1.36"
align="center"
color="white"
scale="1 1 1"
rotation="-90 0 0">
</a-text>

<a-text
value="25 December 2026"
position="0.02 0.20 1.34"
align="center"
color="#444"
scale="1 1 1"
rotation="-90 0 0">
</a-text>


</a-marker>


<a-entity camera></a-entity>

</a-scene>

</body>
</html>
