<!DOCTYPE html>
<html>
<head>
    <title>Elite AR Blessing Wall - Grid System</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #blessingPanel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); padding: 15px;
            border-radius: 20px; z-index: 10; display: flex; gap: 10px;
            width: 85%; max-width: 450px;
        }
        #blessingInput { flex-grow: 1; padding: 12px; border-radius: 12px; border: none; outline: none; }
        #sendBtn { padding: 12px 20px; background: linear-gradient(45deg, #FFD700, #b8860b); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ17F9vJKFy329miOBgRpeR8WxV7wT_8g",
            authDomain: "ar-invitation-card.firebaseapp.com",
            projectId: "ar-invitation-card",
            databaseURL: "https://ar-invitation-card-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // This counter is the key to preventing overlap
        let blessingCount = 0; 

        window.sendBlessing = function() {
            const text = document.getElementById("blessingInput").value;
            if(text.trim() == "") return;
            push(ref(db, "blessings"), { message: text, time: Date.now() });
            document.getElementById("blessingInput").value = "";
        };

        onChildAdded(ref(db, "blessings"), (snapshot) => {
            const data = snapshot.val();
            createGridBlessing(data.message, blessingCount);
            blessingCount++;
        });

        function createGridBlessing(text, index) {
            const marker = document.querySelector("#marker");
            const blessing = document.createElement("a-entity");
            
            // GRID LOGIC: 2 Columns for maximum readability
            const columns = 2;
            const col = index % columns;             
            const row = Math.floor(index / columns); 
            
            // Spacing: X shifts left/right | Y stacks up | Z staggers back to prevent flicker
            const xPos = (col === 0) ? -1.2 : 1.2;   
            const yPos = 0.5 + (row * 0.7); 
            const zPos = -1.0 - (index * 0.1); // Staggering depth
            
            blessing.setAttribute("position", `${xPos} ${yPos} ${zPos}`);

            // The Message Card
            const card = document.createElement("a-plane");
            card.setAttribute("width", "2.0");
            card.setAttribute("height", "0.6");
            card.setAttribute("color", "#ffffff");
            card.setAttribute("material", "opacity: 0.9; transparent: true; side: double");
            card.setAttribute("rotation", "-90 0 0");

            // Gold Border 
            const border = document.createElement("a-plane");
            border.setAttribute("width", "2.1");
            border.setAttribute("height", "0.7");
            border.setAttribute("color", "#FFD700");
            border.setAttribute("position", "0 0 -0.01");
            card.appendChild(border);

            const msgText = document.createElement("a-text");
            msgText.setAttribute("value", text);
            msgText.setAttribute("align", "center");
            msgText.setAttribute("color", "#333");
            msgText.setAttribute("scale", "0.8 0.8 0.8");
            msgText.setAttribute("position", "0 0 0.02");
            msgText.setAttribute("wrap-count", "25"); // Prevents text from leaking out of the box

            card.appendChild(msgText);
            blessing.appendChild(card);
            marker.appendChild(blessing);
        }
    </script>
</head>

<body>
    <div id="blessingPanel">
        <input id="blessingInput" placeholder="Send a blessing forever ❤️">
        <button id="sendBtn" onclick="sendBlessing()">Send</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        <a-marker preset="hiro" id="marker">
            <a-plane position="0 0.01 0" rotation="-90 0 0" width="6" height="8" color="#000" opacity="0.2"></a-plane>
            
            <a-text value="ETERNAL BLESSINGS" position="0 0.2 0" align="center" color="#FFD700" rotation="-90 0 0" scale="1.5 1.5 1.5"></a-text>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
