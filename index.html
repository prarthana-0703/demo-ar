<!DOCTYPE html>
<html>

<head>

<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

<script>

AFRAME.registerComponent('marker-handler',{
init:function(){

const video=document.querySelector("#wedding-video");
const music=document.querySelector("#wedding-music");

this.el.addEventListener("markerFound",()=>{

video.play();

music.currentTime = 0;
music.play();

});

this.el.addEventListener("markerLost",()=>{

video.pause();
music.pause();

});

}
});

</script>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType: webcam; debugUIEnabled: false;">


<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>

</a-assets>

<!-- Wedding Music -->
<audio id="wedding-music" src="wedding-music.mp3"></audio>


<a-marker preset="hiro" marker-handler>

<!-- Invitation Title -->

<a-text
value="You're Invited!"
position="0 1.4 0"
align="center"
color="yellow"
scale="1 1 1">
</a-text>


<!-- Couple Names -->

<a-text
value="Prarthana & Rahul"
position="0 1.2 0"
align="center"
color="#FFD700"
scale="1.3 1.3 1.3">
</a-text>


<!-- Wedding Date -->

<a-text
value="25 December 2026"
position="0 1.0 0"
align="center"
color="white"
scale="0.9 0.9 0.9">
</a-text>


<!-- Wedding Video -->

<a-video
src="#wedding-video"
position="0 0.4 0"
rotation="-90 0 0"
width="1.6"
height="0.9">
</a-video>


</a-marker>


<a-entity camera></a-entity>

</a-scene>

</body>

</html>
