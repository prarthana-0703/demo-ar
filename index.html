<!DOCTYPE html>
<html>
<head>
<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

<script>

// Button interaction logic
AFRAME.registerComponent('button-logic', {
init:function(){

const video=document.querySelector('#wedding-video');
const music=document.querySelector('#bg-music');
const el=this.el;

function handlePress(){

const id=el.getAttribute('id');

if(id==="unmuteBtn"){
video.muted=false;
video.play();
music.play();
}

if(id==="musicBtn"){
if(music.paused){
music.play();
}else{
music.pause();
}
}

if(id==="navBtn"){
window.location.href="navigation.html";
}

}

// tap support
el.addEventListener('click',handlePress);
el.addEventListener('touchstart',handlePress);

}
});


// video control when marker appears
AFRAME.registerComponent('marker-handler',{
init:function(){

const video=document.querySelector("#wedding-video");

this.el.addEventListener("markerFound",()=>{
video.play();
});

this.el.addEventListener("markerLost",()=>{
video.pause();
});

}
});

</script>

</head>

<body>

<audio id="bg-music" loop>
<source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<a-scene
embedded
arjs="sourceType:webcam;debugUIEnabled:false;"
vr-mode-ui="enabled:false">

<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
preload="auto"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

</a-assets>


<a-marker preset="hiro" marker-handler>

<!-- Video -->

<a-video
src="#wedding-video"
position="0 0.8 0"
rotation="-90 0 0"
width="1.8"
height="1.0">
</a-video>


<!-- UNMUTE BUTTON -->

<a-box
id="unmuteBtn"
button-logic
class="clickable"
position="-0.9 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.6"
color="#d4af37">

<a-text
value="Unmute"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- MUSIC BUTTON -->

<a-box
id="musicBtn"
button-logic
class="clickable"
position="0 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.6"
color="#d4af37">

<a-text
value="Music"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- NAVIGATION BUTTON -->

<a-box
id="navBtn"
button-logic
class="clickable"
position="0.9 0.8 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.3"
width="0.7"
color="#d4af37">

<a-text
value="Navigate"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
