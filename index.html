<!DOCTYPE html>
<html>
<head>
    <title>AR Horizontal Sliding Gallery</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

    <a-scene embedded renderer="antialias: true; logarithmicDepthBuffer: true; colorManagement: true;" 
             vr-mode-ui="enabled:false" 
             arjs="sourceType: webcam; debugUIEnabled:false; trackingMethod: best;">

        <a-assets>
            <img id="photo1" src="Screenshot 2026-03-12 001948.png">
            <img id="photo2" src="Screenshot 2026-03-12 003337.png">
            <img id="photo3" src="Illustration of South Indian Wedding Couple.jpg">
            <img id="photo4" src="couple4.jpg">
        </a-assets>

        <a-marker preset="hiro" smooth="true" smoothCount="10">

            <a-text value="Our Journey" position="0 0.1 -1.5" align="center" color="#FFD700" 
                    rotation="-90 0 0" scale="1.5 1.5 1.5">
            </a-text>

            <a-entity id="gallery-container" 
                      position="0 0.2 0" 
                      animation="property: position; 
                                 from: 2 0.2 0; 
                                 to: -2 0.2 0; 
                                 dur: 10000; 
                                 dir: alternate; 
                                 loop: true; 
                                 easing: easeInOutQuad">

                <a-entity position="-2.25 0 0">
                    <a-plane color="#FFD700" width="1.4" height="1.8" rotation="-90 0 0" position="0 -0.01 0"></a-plane>
                    <a-image src="#photo1" rotation="-90 0 0" width="1.3" height="1.7" position="0 0.01 0"></a-image>
                </a-entity>

                <a-entity position="-0.75 0 0">
                    <a-plane color="#FFD700" width="1.4" height="1.8" rotation="-90 0 0" position="0 -0.01 0"></a-plane>
                    <a-image src="#photo2" rotation="-90 0 0" width="1.3" height="1.7" position="0 0.01 0"></a-image>
                </a-entity>

                <a-entity position="0.75 0 0">
                    <a-plane color="#FFD700" width="1.4" height="1.8" rotation="-90 0 0" position="0 -0.01 0"></a-plane>
                    <a-image src="#photo3" rotation="-90 0 0" width="1.3" height="1.7" position="0 0.01 0"></a-image>
                </a-entity>

                <a-entity position="2.25 0 0">
                    <a-plane color="#FFD700" width="1.4" height="1.8" rotation="-90 0 0" position="0 -0.01 0"></a-plane>
                    <a-image src="#photo4" rotation="-90 0 0" width="1.3" height="1.7" position="0 0.01 0"></a-image>
                </a-entity>

            </a-entity>

            <a-plane position="0 0.01 0" rotation="-90 0 0" width="6" height="4" color="#000" opacity="0.4"></a-plane>

        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

</body>
</html>
