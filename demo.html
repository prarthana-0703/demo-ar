<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hiro Marker Cube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js (stable CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false;">

  <!-- Hiro Marker -->
  <a-marker type="pattern"
            url="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/three.js/data/patt.hiro">

    <!-- Rotating Cube -->
    <a-box position="0 0.5 0"
           material="color: red"
           animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
    </a-box>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
