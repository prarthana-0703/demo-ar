<!DOCTYPE html>
<html>
<head>
  <title>AR Wedding Invitation</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #messageBox {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
    }
  </style>
</head>

<body>

<div id="messageBox">Loading AR...</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-marker type="pattern"
            url="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/three.js/data/patt.hiro">

    <a-text id="arText"
            value="Welcome 💖"
            position="0 0.5 0"
            align="center"
            color="yellow">
    </a-text>

    <a-box position="0 0 0" color="red"></a-box>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const messages = {
    "rahul": "Hey Rahul! 💍 You're invited!",
    "priya": "Dear Priya ❤️ Join us!",
  };

  // Get name from URL
  const params = new URLSearchParams(window.location.search);
  let name = params.get("name") || "guest";

  name = name.toLowerCase();

  let msg = messages[name] || "Welcome! You are invited 💖";

  document.getElementById("messageBox").innerText = msg;
  document.querySelector("#arText").setAttribute("value", msg);
</script>

</body>
</html>
