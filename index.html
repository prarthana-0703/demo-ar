<!DOCTYPE html>
<html>
<head>
  <title>AR Wedding Invitation</title>

  <!-- A-Frame & AR.js -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>

  <script>
    // Marker video play/pause
    AFRAME.registerComponent('marker-video', {
      init: function () {
        const video = document.querySelector('#wedding-video');
        this.el.addEventListener('markerFound', () => video.play());
        this.el.addEventListener('markerLost', () => video.pause());
      }
    });
  </script>
</head>

<body>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="wedding-music.mp3" type="audio/mpeg">
  </audio>

  <!-- AR Scene -->
  <a-scene
    embedded
    renderer="alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled:false"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable">

    <a-assets>
      <video
        id="wedding-video"
        src="GIF_Video_Generation_Successful.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <!-- Hiro Marker -->
    <a-marker preset="hiro" smooth="true" marker-video>

      <!-- Video -->
      <a-video
        src="#wedding-video"
        position="0 0.8 0"
        rotation="-90 0 0"
        width="1.8"
        height="1.0">
      </a-video>

      <!-- Golden Background -->
      <a-plane
        position="0 0.8 -0.01"
        rotation="-90 0 0"
        width="1.9"
        height="1.1"
        color="#d4af37"
        material="side: back">
      </a-plane>

      <!-- FLOATING AR BUTTONS -->

      <!-- Unmute -->
      <a-plane
        class="clickable"
        position="-0.8 0.2 0"
        rotation="-90 0 0"
        width="0.5"
        height="0.2"
        color="#d4af37"
        onclick="document.querySelector('#wedding-video').muted=false;">
        <a-text value="Unmute"
          align="center"
          color="white"
          position="0 0 0.01"
          scale="0.5 0.5 0.5">
        </a-text>
      </a-plane>

      <!-- Music -->
      <a-plane
        class="clickable"
        position="0 0.2 0"
        rotation="-90 0 0"
        width="0.5"
        height="0.2"
        color="#d4af37"
        onclick="var m=document.querySelector('#bg-music'); m.paused?m.play():m.pause();">
        <a-text value="Music"
          align="center"
          color="white"
          position="0 0 0.01"
          scale="0.5 0.5 0.5">
        </a-text>
      </a-plane>

      <!-- Navigation -->
      <a-plane
        class="clickable"
        position="0.8 0.2 0"
        rotation="-90 0 0"
        width="0.6"
        height="0.2"
        color="#d4af37"
        onclick="window.location.href='navigation.html';">
        <a-text value="Navigate"
          align="center"
          color="white"
          position="0 0 0.01"
          scale="0.5 0.5 0.5">
        </a-text>
      </a-plane>

    </a-marker>

    <a-camera></a-camera>

  </a-scene>

</body>
</html>
