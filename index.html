<!DOCTYPE html>
<html>

<head>
    <title>AR Wedding Invitation</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>

    <script>
        // Component to handle the music interaction
        AFRAME.registerComponent('music-button', {
            init: function () {
                const music = document.querySelector("#wedding-music");
                
                // Add click listener
                this.el.addEventListener("click", () => {
                    if (music.paused) {
                        music.play().catch(err => {
                            console.log("Playback blocked by browser. Interaction required.");
                        });
                        console.log("Music Playing");
                    } else {
                        music.pause();
                        console.log("Music Paused");
                    }
                });
            }
        });
    </script>
</head>

<body>
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <video id="wedding-video" src="GIF_Video_Generation_Successful.mp4" loop muted playsinline webkit-playsinline></video>
            
            <img id="music-icon" src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
        </a-assets>

        <audio id="wedding-music" src="wedding-music.mp3" preload="auto"></audio>

        <a-marker preset="hiro">
            <a-text value="You're Invited!" position="0 1.4 0" align="center" color="yellow" scale="1 1 1"></a-text>

            <a-text value="Prarthana & Rahul" position="0 1.2 0" align="center" color="#FFD700" scale="1.3 1.3 1.3"></a-text>

            <a-text value="25 December 2026" position="0 1.0 0" align="center" color="white" scale="0.9 0.9 0.9"></a-text>

            <a-image 
                src="#music-icon" 
                class="clickable" 
                music-button 
                position="1 1 0" 
                rotation="-90 0 0" 
                width="0.5" 
                height="0.5">
            </a-image>

            <a-video src="#wedding-video" position="0 0.4 0" rotation="-90 0 0" width="1.6" height="0.9"></a-video>
        </a-marker>

        <a-entity camera>
            <a-cursor fuse="false" raycaster="objects: .clickable" color="cyan"></a-cursor>
        </a-entity>

    </a-scene>
</body>
</html>
