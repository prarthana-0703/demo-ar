<!DOCTYPE html>
<html>
<head>
<title>AR Horizontal Sliding Gallery</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene
embedded
renderer="antialias: true;"
vr-mode-ui="enabled:false"
arjs="sourceType: webcam; debugUIEnabled:false; trackingMethod: best;">

<a-assets>
<img id="photo1" src="Screenshot 2026-03-12 001948.png">
<img id="photo2" src="Screenshot 2026-03-12 003337.png">
<img id="photo3" src="Illustration of South Indian Wedding Couple.jpg">
<img id="photo4" src="couple4.jpg">
</a-assets>

<!-- Marker -->
<a-marker
preset="hiro"
smooth="true"
smoothCount="30"
smoothTolerance="0.01"
smoothThreshold="10">

<!-- Title -->
<a-text
value="Our Journey"
position="0 0.6 -1.2"
align="center"
color="#FFD700"
rotation="-90 0 0"
scale="1.3 1.3 1.3">
</a-text>

<!-- Gallery Animation -->
<a-entity
id="gallery-container"
position="0 0.1 0"
animation="property: position;
           from: 0.8 0.1 0;
           to: -0.8 0.1 0;
           dur: 12000;
           dir: alternate;
           loop: true;
           easing: linear">

<!-- PHOTO 1 -->
<a-entity position="-1.2 0 0">

<a-plane
color="#FFD700"
width="1.3"
height="1.7"
rotation="-90 0 0"
position="0 0 -0.04">
</a-plane>

<a-image
src="#photo1"
rotation="-90 0 0"
width="1.2"
height="1.6"
position="0 0 0.02"
material="transparent:true; side:double; alphaTest:0.5">
</a-image>

</a-entity>

<!-- PHOTO 2 -->
<a-entity position="0 0 0">

<a-plane
color="#FFD700"
width="1.3"
height="1.7"
rotation="-90 0 0"
position="0 0 -0.04">
</a-plane>

<a-image
src="#photo2"
rotation="-90 0 0"
width="1.2"
height="1.6"
position="0 0 0.02"
material="transparent:true; side:double; alphaTest:0.5">
</a-image>

</a-entity>

<!-- PHOTO 3 -->
<a-entity position="1.2 0 0">

<a-plane
color="#FFD700"
width="1.3"
height="1.7"
rotation="-90 0 0"
position="0 0 -0.04">
</a-plane>

<a-image
src="#photo3"
rotation="-90 0 0"
width="1.2"
height="1.6"
position="0 0 0.02"
material="transparent:true; side:double; alphaTest:0.5">
</a-image>

</a-entity>

<!-- PHOTO 4 -->
<a-entity position="2.4 0 0">

<a-plane
color="#FFD700"
width="1.3"
height="1.7"
rotation="-90 0 0"
position="0 0 -0.04">
</a-plane>

<a-image
src="#photo4"
rotation="-90 0 0"
width="1.2"
height="1.6"
position="0 0 0.02"
material="transparent:true; side:double; alphaTest:0.5">
</a-image>

</a-entity>

</a-entity>

<!-- Ground -->
<a-plane
position="0 0 0"
rotation="-90 0 0"
width="4"
height="3"
color="#000"
opacity="0.25">
</a-plane>

</a-marker>

<!-- Camera -->
<a-entity camera look-controls="enabled:false"></a-entity>

</a-scene>

</body>
</html>
