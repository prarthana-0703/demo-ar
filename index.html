<!DOCTYPE html>
<html>
<head>
    <title>AR Eternal Blessing Wall</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #blessingPanel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); padding: 15px;
            border-radius: 20px; z-index: 10; display: flex; gap: 10px;
            width: 85%; max-width: 450px;
        }
        #blessingInput { flex-grow: 1; padding: 12px; border-radius: 12px; border: none; outline: none; }
        #sendBtn { padding: 12px 20px; background: linear-gradient(45deg, #FFD700, #b8860b); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJ17F9vJKFy329miOBgRpeR8WxV7wT_8g",
            authDomain: "ar-invitation-card.firebaseapp.com",
            projectId: "ar-invitation-card",
            databaseURL: "https://ar-invitation-card-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let messageCount = 0;

        window.sendBlessing = function() {
            const text = document.getElementById("blessingInput").value;
            if(text.trim() == "") return;
            push(ref(db, "blessings"), { message: text, time: Date.now() });
            document.getElementById("blessingInput").value = "";
        };

        onChildAdded(ref(db, "blessings"), (snapshot) => {
            const data = snapshot.val();
            addTextToWall(data.message);
        });

        function addTextToWall(text) {
            const wall = document.querySelector("#blessing-wall");
            
            const msgEntity = document.createElement("a-text");
            // Stack messages vertically: each new message moves down
            const yOffset = 0.8 - (messageCount * 0.25); 
            
            msgEntity.setAttribute("value", "• " + text);
            msgEntity.setAttribute("position", `-0.7 ${yOffset} 0.02`);
            msgEntity.setAttribute("color", "#b8860b");
            msgText.setAttribute("font", "mozillavr");
            msgEntity.setAttribute("scale", "0.6 0.6 0.6");
            msgEntity.setAttribute("width", "3");

            wall.appendChild(msgEntity);
            messageCount++;
        }
    </script>
</head>

<body>
    <div id="blessingPanel">
        <input id="blessingInput" placeholder="Write a blessing forever...">
        <button id="sendBtn" onclick="sendBlessing()">Send</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse">
        <a-assets>
            <video id="wedding-video" src="GIF_Video_Generation_Successful.mp4" loop muted playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <a-video src="#wedding-video" position="0.8 0.1 0" rotation="-90 0 0" width="1.8" height="1.1"></a-video>

            <a-entity id="blessing-wall" position="-1.2 0.1 0" rotation="-90 0 0">
                <a-plane width="1.6" height="2.2" color="#FFF" opacity="0.8" material="transparent: true"></a-plane>
                <a-plane width="1.65" height="2.25" color="#FFD700" position="0 0 -0.01"></a-plane>
                
                <a-text value="GUEST BLESSINGS" position="0 1.0 0.02" align="center" color="#000" scale="0.8 0.8 0.8"></a-text>
            </a-entity>

            <a-text value="Prarthana & Rahul" position="0.8 0.2 -0.8" align="center" color="#FFD700" rotation="-90 0 0"></a-text>
            <a-text value="25 Dec 2026" position="0.8 0.2 0.8" align="center" color="white" rotation="-90 0 0"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
