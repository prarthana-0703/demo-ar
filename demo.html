<!DOCTYPE html>
<html>
<head>
<title>AR Horizontal Sliding Gallery</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene
embedded
renderer="antialias: true; precision: mediump;"
vr-mode-ui="enabled:false"
arjs="sourceType: webcam; facingMode: environment; debugUIEnabled:false;">

<a-assets>
<img id="photo1" src="Screenshot 2026-03-12 001948.png">
<img id="photo2" src="Screenshot 2026-03-12 003337.png">
<img id="photo3" src="Illustration of South Indian Wedding Couple.jpg">
<img id="photo4" src="couple4.jpg">
</a-assets>

<a-marker
preset="hiro"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5">

<!-- ✅ UPDATED TEXT (ID ADDED) -->
<a-text
id="welcomeText"
value="Our Journey"
position="0 0.6 -1.2"
align="center"
color="#FFD700"
rotation="-90 0 0"
scale="1.3 1.3 1.3">
</a-text>

<!-- GALLERY -->
<a-entity
id="gallery-container"
position="0 0.1 0"
animation="property: position;
           from: 1.5 0.1 0;
           to: -1.5 0.1 0;
           dur: 10000;
           dir: alternate;
           loop: true;
           easing: linear">

<!-- PHOTO 1 -->
<a-entity position="-1.5 0 0">
<a-plane color="#FFD700" width="1.35" height="1.75" rotation="-90 0 0"></a-plane>

<a-image
src="#photo1"
rotation="-90 0 0"
width="1.25"
height="1.65"
position="0 0 0.01">
</a-image>
</a-entity>

<!-- PHOTO 2 -->
<a-entity position="0 0 0">
<a-plane color="#FFD700" width="1.35" height="1.75" rotation="-90 0 0"></a-plane>

<a-image
src="#photo2"
rotation="-90 0 0"
width="1.25"
height="1.65"
position="0 0 0.01">
</a-image>
</a-entity>

<!-- PHOTO 3 -->
<a-entity position="1.5 0 0">
<a-plane color="#FFD700" width="1.35" height="1.75" rotation="-90 0 0"></a-plane>

<a-image
src="#photo3"
rotation="-90 0 0"
width="1.25"
height="1.65"
position="0 0 0.01">
</a-image>
</a-entity>

<!-- PHOTO 4 -->
<a-entity position="3 0 0">
<a-plane color="#FFD700" width="1.35" height="1.75" rotation="-90 0 0"></a-plane>

<a-image
src="#photo4"
rotation="-90 0 0"
width="1.25"
height="1.65"
position="0 0 0.01">
</a-image>
</a-entity>

</a-entity>

<!-- ============================= -->
<!-- 📅 AR WEDDING SCHEDULE BELOW -->
<!-- ============================= -->

<!-- Title -->
<a-text
value="Wedding Schedule"
position="0 0.01 1.5"
align="center"
color="#FFD700"
rotation="-90 0 0"
scale="1.2 1.2 1.2">
</a-text>

<!-- Timeline line -->
<a-plane
position="0 0.01 2.2"
rotation="-90 0 0"
width="4"
height="0.05"
color="#FF6B9D"
opacity="0.7">
</a-plane>

<!-- EVENT 1 -->
<a-entity position="-1.8 0 2.7">
    <a-plane width="0.9" height="0.6" color="#221500" rotation="-90 0 0"></a-plane>
    <a-text value="08:00 AM\nHaldi\n13 Feb"
        position="0 0.01 0"
        align="center"
        color="#FFD700"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<!-- EVENT 2 -->
<a-entity position="-0.6 0 2.7">
    <a-plane width="0.9" height="0.6" color="#220018" rotation="-90 0 0"></a-plane>
    <a-text value="02:00 PM\nMehendi\n13 Feb"
        position="0 0.01 0"
        align="center"
        color="#FF69B4"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<!-- EVENT 3 -->
<a-entity position="0.6 0 2.7">
    <a-plane width="0.9" height="0.6" color="#221000" rotation="-90 0 0"></a-plane>
    <a-text value="07:00 PM\nSangeet\n13 Feb"
        position="0 0.01 0"
        align="center"
        color="#FFA500"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<!-- EVENT 4 -->
<a-entity position="1.8 0 2.7">
    <a-plane width="0.9" height="0.6" color="#001a18" rotation="-90 0 0"></a-plane>
    <a-text value="09:00 AM\nVarmala\n14 Feb"
        position="0 0.01 0"
        align="center"
        color="#00FFD1"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<!-- SECOND ROW -->

<!-- EVENT 5 -->
<a-entity position="-1.2 0 3.6">
    <a-plane width="1" height="0.7" color="#2d0010" rotation="-90 0 0"></a-plane>
    <a-text value="10:00 AM\nWedding\n14 Feb"
        position="0 0.01 0"
        align="center"
        color="#FF3B7F"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<!-- EVENT 6 -->
<a-entity position="0 0 3.6">
    <a-plane width="1" height="0.7" color="#221400" rotation="-90 0 0"></a-plane>
    <a-text value="01:00 PM\nReception\n14 Feb"
        position="0 0.01 0"
        align="center"
        color="#FF9500"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<!-- EVENT 7 -->
<a-entity position="1.2 0 3.6">
    <a-plane width="1" height="0.7" color="#130022" rotation="-90 0 0"></a-plane>
    <a-text value="07:00 PM\nFarewell\n14 Feb"
        position="0 0.01 0"
        align="center"
        color="#C8A0FF"
        rotation="-90 0 0"
        width="2">
    </a-text>
</a-entity>

<a-plane
position="0 0 0"
rotation="-90 0 0"
width="4"
height="3"
color="#000"
opacity="0.25">
</a-plane>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<!-- ✅ NAME DETECTION SCRIPT -->
<script>
window.addEventListener("load", () => {

    const params = new URLSearchParams(window.location.search);
    let name = params.get("name") || "Guest";

    // Capitalize first letter
    name = name.charAt(0).toUpperCase() + name.slice(1);

    // Custom message
    let message = `Welcome ${name} ❤️\nOur Journey`;

    // Wait for AR to load
    setTimeout(() => {
        const textEl = document.querySelector("#welcomeText");
        if (textEl) {
            textEl.setAttribute("value", message);
        }
    }, 1000);

});
</script>

</body>
</html>
