<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIT AR Navigation - SJT</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: black; font-family: 'Segoe UI', sans-serif; }
        #camera-feed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #ar-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 12px 25px; border-radius: 30px; border: 2px solid #00ff00; color: white; font-size: 16px; z-index: 10; text-align: center; min-width: 230px; transition: all 0.5s ease; }
        #distance { position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%); color: #00ff00; font-size: 30px; font-weight: bold; text-shadow: 2px 2px 8px rgba(0,0,0,0.8); z-index: 10; }
        #mini-map { position: fixed; bottom: 20px; right: 20px; width: 160px; height: 160px; border-radius: 50%; border: 3px solid white; z-index: 10; overflow: hidden; background: black; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #start-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; background: #00ff00; border: none; border-radius: 50px; font-weight: bold; z-index: 100; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        
        /* Arrival Class */
        .arrived { border-color: #ffd700 !important; color: #ffd700 !important; box-shadow: 0 0 20px #ffd700; }
    </style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="ar-canvas"></canvas>

<div id="hud">Target: SJT</div>
<div id="distance">Waiting for GPS...</div>
<div id="mini-map"></div>

<button id="start-btn" onclick="startAR()">START NAVIGATION</button>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* --- CONFIG --- */
const MAPBOX_TOKEN = "pk.eyJ1IjoiaGVtYW50aDg1MDMiLCJhIjoiY21rNzV5c2w2MHlqeTNncjI5bjkyeWJwaiJ9.NnunzAB_24Ntn83H5hRcyQ"; 
const DESTINATION = [79.163884, 12.971034]; // SJT [lng, lat]

let scene, camera, renderer, arrowMesh;
let map, userMarker;

let targetBearing = 0;
let deviceHeading = 0;
let smoothHeading = 0;
let lastRawHeading = 0;
let isRunning = false;
let hasArrived = false;

/* --- START AR --- */
async function startAR() {
    if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
            const response = await DeviceOrientationEvent.requestPermission();
            if (response !== "granted") {
                alert("Compass permission denied.");
                return;
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById("start-btn").style.display = "none";

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById("camera-feed").srcObject = stream;
    } catch (e) {
        alert("Camera access failed. Ensure you are using HTTPS.");
    }

    initThree();
    initMap();

    navigator.geolocation.watchPosition(handleGPS, (err) => console.error(err), { enableHighAccuracy: true });
    window.addEventListener("deviceorientation", handleOrientation, true);

    isRunning = true;
    animate();
}

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("ar-canvas"), alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    const shape = new THREE.Shape();
    shape.moveTo(0, 0.8);
    shape.lineTo(0.4, 0);
    shape.lineTo(0.15, 0);
    shape.lineTo(0.15, -0.6);
    shape.lineTo(-0.15, -0.6);
    shape.lineTo(-0.15, 0);
    shape.lineTo(-0.4, 0);
    shape.closePath();

    const geometry = new THREE.ExtrudeGeometry(shape, { depth: 0.15, bevelEnabled: false });
    const material = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x003300 });
    
    arrowMesh = new THREE.Mesh(geometry, material);
    arrowMesh.position.set(0, -1.2, -5);
    arrowMesh.rotation.x = -Math.PI / 2;
    arrowMesh.scale.set(1.5, 1.5, 1.5);
    scene.add(arrowMesh);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
}

function initMap() {
    mapboxgl.accessToken = MAPBOX_TOKEN;
    map = new mapboxgl.Map({
        container: "mini-map",
        style: "mapbox://styles/mapbox/navigation-night-v1",
        center: DESTINATION,
        zoom: 16,
        pitch: 45,
        interactive: false
    });

    map.on('load', () => {
        map.resize();
        new mapboxgl.Marker({ color: "#ff0000" }).setLngLat(DESTINATION).addTo(map);
        userMarker = new mapboxgl.Marker({ color: "#00ff00" }).setLngLat([0,0]).addTo(map);
    });
}

async function handleGPS(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const dist = getDistance(lat, lng, DESTINATION[1], DESTINATION[0]);

    if (userMarker) userMarker.setLngLat([lng, lat]);
    
    if (map) {
        map.easeTo({ center: [lng, lat], bearing: deviceHeading, duration: 1000 });
    }

    const distDisplay = Math.round(dist);
    document.getElementById("distance").innerText = distDisplay + " m";

    // ARRIVAL LOGIC (10 meters)
    if (dist <= 10 && !hasArrived) {
        hasArrived = true;
        triggerArrival();
    } else if (dist > 10) {
        hasArrived = false;
        resetUI();
    }

    if (hasArrived) return; // Stop fetching routes if arrived

    try {
        const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${lng},${lat};${DESTINATION[0]},${DESTINATION[1]}?geometries=geojson&access_token=${MAPBOX_TOKEN}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.routes && data.routes.length > 0) {
            let coords = data.routes[0].geometry.coordinates;
            let nextPoint = coords.length > 1 ? coords[1] : DESTINATION;
            targetBearing = getBearing(lat, lng, nextPoint[1], nextPoint[0]);
        }
    } catch (e) { console.log("Routing error"); }
}

function triggerArrival() {
    const hud = document.getElementById("hud");
    hud.innerText = "📍 ARRIVED AT SJT";
    hud.classList.add("arrived");
    document.getElementById("distance").style.color = "#ffd700";
    arrowMesh.material.color.setHex(0xffd700); // Gold Arrow
    
    // Haptic Feedback (Android)
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function resetUI() {
    const hud = document.getElementById("hud");
    hud.innerText = "Target: SJT";
    hud.classList.remove("arrived");
    document.getElementById("distance").style.color = "#00ff00";
    arrowMesh.material.color.setHex(0x00ff00);
}

function handleOrientation(e) {
    let rawHeading = e.webkitCompassHeading || (360 - e.alpha);
    let diff = rawHeading - lastRawHeading;
    if (diff > 180) lastRawHeading += 360;
    if (diff < -180) lastRawHeading -= 360;
    smoothHeading = smoothHeading + (rawHeading - smoothHeading) * 0.05;
    deviceHeading = (smoothHeading + 360) % 360;
    lastRawHeading = rawHeading;
}

function animate() {
    requestAnimationFrame(animate);
    if (!isRunning) return;

    let angleDiff = targetBearing - deviceHeading;
    let targetRad = THREE.MathUtils.degToRad(angleDiff);
    let currentRotation = arrowMesh.rotation.z;
    let diff = targetRad - currentRotation;
    while (diff < -Math.PI) diff += Math.PI * 2;
    while (diff > Math.PI) diff -= Math.PI * 2;
    arrowMesh.rotation.z += diff * 0.1;

    // Arrival Animation: Bobbing
    if (hasArrived) {
        arrowMesh.position.y = -1.2 + Math.sin(Date.now() * 0.005) * 0.15;
    } else {
        arrowMesh.position.y = -1.2;
    }

    renderer.render(scene, camera);
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getBearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
    const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}
</script>
</body>
</html>
