<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled:false">

  <a-assets>
    <video
      id="wedding-video"
      src="GIF_Video_Generation_Successful.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-marker preset="hiro" marker-handler>

    <a-video
      src="#wedding-video"
      position="0 0.8 0"
      rotation="-90 0 0"
      width="1.8"
      height="1.0">
    </a-video>

    <!-- UNMUTE BUTTON -->
    <a-box
      id="unmuteBtn"
      class="clickable"
      button-logic
      position="-0.8 0.8 0.8"
      rotation="-90 0 0"
      depth="0.1" height="0.3" width="0.6"
      color="#d4af37">
      <a-text value="Unmute" align="center" position="0 0 0.06" scale="0.4 0.4 0.4"></a-text>
    </a-box>

    <!-- MUSIC BUTTON -->
    <a-box
      id="musicBtn"
      class="clickable"
      button-logic
      position="0 0.8 0.8"
      rotation="-90 0 0"
      depth="0.1" height="0.3" width="0.6"
      color="#d4af37">
      <a-text value="Music" align="center" position="0 0 0.06" scale="0.4 0.4 0.4"></a-text>
    </a-box>

    <!-- NAVIGATION BUTTON -->
    <a-box
      id="navBtn"
      class="clickable"
      button-logic
      position="0.8 0.8 0.8"
      rotation="-90 0 0"
      depth="0.1" height="0.3" width="0.7"
      color="#d4af37">
      <a-text value="Navigate" align="center" position="0 0 0.06" scale="0.4 0.4 0.4"></a-text>
    </a-box>

  </a-marker>

  <!-- CAMERA WITH CURSOR -->
  <a-entity camera>

    <a-cursor
      fuse="true"
      fuse-timeout="1000"
      raycaster="objects: .clickable"
      material="color: white">
    </a-cursor>

  </a-entity>

</a-scene>
