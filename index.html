<!DOCTYPE html>
<html>
<head>
    <title>Premium AR Wedding Invitation</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Add a nice loading font if you want, but standard A-Frame fonts are safer */
    </style>

    <script>
        AFRAME.registerComponent('music-button', {
            init: function () {
                const music = document.querySelector("#wedding-music");
                this.el.addEventListener("click", () => {
                    if (music.paused) {
                        music.play();
                        this.el.setAttribute('color', '#FFD700'); // Glow gold when playing
                    } else {
                        music.pause();
                        this.el.setAttribute('color', 'white');
                    }
                });
            }
        });
    </script>
</head>

<body>
    <a-scene 
        embedded 
        vr-mode-ui="enabled: false" 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .clickable">

        <a-assets>
            <video id="wedding-video" src="GIF_Video_Generation_Successful.mp4" loop muted playsinline webkit-playsinline></video>
            <img id="music-icon" src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
        </a-assets>

        <audio id="wedding-music" src="wedding-music.mp3" preload="auto"></audio>

        <a-marker preset="hiro">

            <a-plane position="0 0.05 0" rotation="-90 0 0" width="2.8" height="3.5" color="#000" opacity="0.4" material="transparent: true;"></a-plane>

            <a-rect position="0 0.1 0" rotation="-90 0 0" width="2.3" height="1.4" color="#FFD700" material="wireframe: true; wireframeLineWidth: 2"></a-rect>

            <a-entity animation="property: position; to: 0 0.1 0; dur: 2000; dir: alternate; loop: true">
                <a-text 
                    value="Prarthana & Rahul" 
                    position="0 0.2 -1.1" 
                    align="center" 
                    color="#FFD700" 
                    font="monoid"
                    scale="1.5 1.5 1.5" 
                    rotation="-90 0 0">
                </a-text>
            </a-entity>

            <a-video 
                src="#wedding-video" 
                position="0 0.1 0" 
                rotation="-90 0 0" 
                width="2.2" 
                height="1.3">
            </a-video>

            <a-image 
                src="#music-icon" 
                class="clickable" 
                music-button 
                position="1.0 0.2 0.8" 
                rotation="-90 0 0" 
                width="0.5" 
                height="0.5"
                animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 800; loop: true">
            </a-image>

            <a-text 
                value="SAVE THE DATE" 
                position="0 0.2 1.1" 
                align="center" 
                color="#FFD700" 
                scale="0.6 0.6 0.6" 
                rotation="-90 0 0">
            </a-text>
            <a-text 
                value="25 December 2026" 
                position="0 0.2 1.4" 
                align="center" 
                color="white" 
                scale="0.9 0.9 0.9" 
                rotation="-90 0 0">
            </a-text>

        </a-marker>

        <a-entity camera>
            <a-cursor fuse="false" raycaster="objects: .clickable" color="#FFD700" scale="1.5 1.5 1.5"></a-cursor>
        </a-entity>

    </a-scene>
</body>
</html>
