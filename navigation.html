<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced AR Wedding Navigation</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#camera-feed{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

#ar-canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

#debug-panel{
position:fixed;
top:10px;
left:10px;
color:lime;
font-size:12px;
background:rgba(0,0,0,0.6);
padding:5px;
z-index:20;
}

#hud{
position:fixed;
top:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
padding:15px 30px;
border-radius:50px;
border:3px solid #00ff00;
color:white;
font-size:20px;
font-weight:bold;
z-index:10;
}

#mini-map{
position:fixed;
bottom:30px;
right:20px;
width:150px;
height:150px;
border-radius:20px;
border:4px solid white;
z-index:10;
}

#start-btn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 50px;
font-size:20px;
background:#00e5ff;
border:none;
border-radius:50px;
font-weight:bold;
z-index:50;
cursor:pointer;
}

#distanceUI{
position:fixed;
bottom:180px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<video id="camera-feed" autoplay playsinline muted></video>
<canvas id="ar-canvas"></canvas>

<div id="debug-panel">
GPS: <span id="dbg-gps">Waiting</span><br>
Compass: <span id="dbg-compass">Waiting</span>
</div>

<div id="hud">Waiting for Start...</div>
<div id="distanceUI"></div>

<div id="mini-map"></div>

<button id="start-btn" onclick="startAR()">ENTER AR MODE</button>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ================= CONFIG =================

const MAPBOX_TOKEN="YOUR_MAPBOX_TOKEN";
const DESTINATION=[79.1559,12.9692];
const CARROT_DIST=20;

// ================= VARIABLES =================

let scene,camera,renderer;
let arrowMesh;
let routeCoords=[];
let deviceHeading=0;
let smoothHeading=0;
let targetBearing=0;
let isRunning=false;

let smoothLat=null;
let smoothLng=null;

// ================= START =================

async function startAR(){

document.getElementById("start-btn").style.display="none";

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

document.getElementById("camera-feed").srcObject=stream;

initThree();
requestSensors();

isRunning=true;
animate();

}

// ================= THREE =================

function initThree(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("ar-canvas"),
alpha:true,
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

// arrow shape

const shape=new THREE.Shape();

shape.moveTo(0.3,0);
shape.lineTo(0.3,1.5);
shape.lineTo(1,1.5);
shape.lineTo(0,2.5);
shape.lineTo(-1,1.5);
shape.lineTo(-0.3,1.5);
shape.lineTo(-0.3,0);

const geo=new THREE.ExtrudeGeometry(shape,{
depth:0.2,
bevelEnabled:true,
bevelSize:0.05,
bevelThickness:0.05
});

geo.center();

const material=new THREE.MeshPhongMaterial({
color:0x00ff00,
emissive:0x00ff00,
emissiveIntensity:0.6,
shininess:80
});

arrowMesh=new THREE.Mesh(geo,material);

arrowMesh.rotation.x=-Math.PI/2;
arrowMesh.position.set(0,-1.5,-4);

scene.add(arrowMesh);

const ambient=new THREE.AmbientLight(0xffffff,0.7);
scene.add(ambient);

const light=new THREE.DirectionalLight(0xffffff,0.8);
light.position.set(5,10,7);
scene.add(light);

}

// ================= ANIMATION =================

function animate(){

requestAnimationFrame(animate);

if(!isRunning) return;

let bearingRad=THREE.MathUtils.degToRad(targetBearing);
let headingRad=THREE.MathUtils.degToRad(deviceHeading);

let desiredRotation=bearingRad-headingRad;

desiredRotation=Math.atan2(
Math.sin(desiredRotation),
Math.cos(desiredRotation)
);

arrowMesh.rotation.y+=
(desiredRotation-arrowMesh.rotation.y)*0.15;

arrowMesh.position.y=
-1.5+Math.sin(Date.now()*0.003)*0.1;

renderer.render(scene,camera);

}

// ================= SENSORS =================

function requestSensors(){

window.addEventListener("deviceorientation",handleOrientation);

navigator.geolocation.watchPosition(
handleGPS,
console.error,
{enableHighAccuracy:true}
);

}

function handleOrientation(e){

let heading;

if(e.webkitCompassHeading){
heading=e.webkitCompassHeading;
}
else if(e.alpha!==null){
heading=360-e.alpha;
}
else{
heading=0;
}

smoothHeading=smoothHeading*0.9+heading*0.1;

deviceHeading=smoothHeading;

document.getElementById("dbg-compass").innerText=
Math.round(deviceHeading)+"°";

}

// ================= GPS =================

function handleGPS(pos){

const rawLat=pos.coords.latitude;
const rawLng=pos.coords.longitude;

if(smoothLat===null){
smoothLat=rawLat;
smoothLng=rawLng;
}

smoothLat=smoothLat*0.8+rawLat*0.2;
smoothLng=smoothLng*0.8+rawLng*0.2;

const lat=smoothLat;
const lng=smoothLng;

document.getElementById("dbg-gps").innerText=
lat.toFixed(5)+","+lng.toFixed(5);

// route fetch

if(routeCoords.length===0){
getRoute(lat,lng);
}

const carrot=getCarrotPoint(lat,lng,routeCoords,CARROT_DIST);

targetBearing=getBearing(
lat,
lng,
carrot[1],
carrot[0]
);

const dist=getDistance(
lat,
lng,
DESTINATION[1],
DESTINATION[0]
);

document.getElementById("distanceUI").innerText=
"Distance "+Math.round(dist)+" m";

if(dist<10){
document.getElementById("hud").innerText=
"🎉 Destination Reached 🎉";
}

}

// ================= ROUTE =================

async function getRoute(lat,lng){

const url=`https://api.mapbox.com/directions/v5/mapbox/walking/${lng},${lat};${DESTINATION[0]},${DESTINATION[1]}?geometries=geojson&access_token=${MAPBOX_TOKEN}`;

const res=await fetch(url);

const data=await res.json();

routeCoords=data.routes[0].geometry.coordinates;

}

// ================= MATH =================

function getDistance(lat1,lon1,lat2,lon2){

const R=6371e3;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)**2;

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

}

function getBearing(lat1,lon1,lat2,lon2){

const dLon=(lon2-lon1)*Math.PI/180;

const y=Math.sin(dLon)*Math.cos(lat2*Math.PI/180);

const x=
Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)
-
Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);

return (Math.atan2(y,x)*180/Math.PI+360)%360;

}

// ================= CARROT =================

function getCarrotPoint(lat,lng,coords,lookAhead){

if(coords.length===0) return DESTINATION;

let closest=0;
let min=Infinity;

for(let i=0;i<coords.length;i++){

const d=getDistance(
lat,
lng,
coords[i][1],
coords[i][0]
);

if(d<min){
min=d;
closest=i;
}

}

let target=closest;

let dist=0;

while(target<coords.length-1){

const p1=coords[target];
const p2=coords[target+1];

dist+=getDistance(
p1[1],
p1[0],
p2[1],
p2[0]
);

target++;

if(dist>lookAhead) break;

}

return coords[target];

}

</script>

</body>
</html>
