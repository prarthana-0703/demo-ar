<!DOCTYPE html>
<html>
<head>
  <title>AR Wedding Invitation</title>

  <!-- A-Frame & AR.js -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.3.2/aframe/build/aframe-ar.js"></script>

  <style> 
    body { margin: 0; overflow: hidden; }
  </style>

  <script>
    // Marker video play/pause
    AFRAME.registerComponent('marker-video', {
      init: function () {
        const video = document.querySelector('#wedding-video');
        this.el.addEventListener('markerFound', () => video.play());
        this.el.addEventListener('markerLost', () => video.pause());
      }
    });
  </script>
</head>

<body>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="wedding-music.mp3" type="audio/mpeg">
  </audio>

  <!-- AR Scene -->
  <a-scene
    embedded
    renderer="alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled:false"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable">

    <a-assets>
      <video
        id="wedding-video"
        src="GIF_Video_Generation_Successful.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <!-- Hiro Marker -->
    <a-marker preset="hiro" smooth="true" marker-video>

      <!-- Video -->
      <a-video
        src="#wedding-video"
        position="0 0.8 0"
        rotation="-90 0 0"
        width="1.8"
        height="1.0">
      </a-video>

      <!-- Golden Background -->
      <a-plane
        position="0 0.8 -0.01"
        rotation="-90 0 0"
        width="1.9"
        height="1.1"
        color="#d4af37"
        material="side: back">
      </a-plane>

      <!-- ========================= -->
      <!-- 3D FLOATING BUTTONS -->
      <!-- ========================= -->

     <!-- 3D FLOATING BUTTONS BELOW VIDEO (VISIBLE FIXED) -->

<!-- Unmute -->
<a-box
  class="clickable"
  position="-0.8 0.35 0.15"
  depth="0.15"
  height="0.25"
  width="0.6"
  color="#d4af37"
  onclick="document.querySelector('#wedding-video').muted=false;">

  <a-text value="Unmute"
    align="center"
    color="white"
    position="0 0 0.09"
    scale="0.6 0.6 0.6">
  </a-text>
</a-box>

<!-- Music -->
<a-box
  class="clickable"
  position="0 0.35 0.15"
  depth="0.15"
  height="0.25"
  width="0.6"
  color="#d4af37"
  onclick="var m=document.querySelector('#bg-music'); m.paused?m.play():m.pause();">

  <a-text value="Music"
    align="center"
    color="white"
    position="0 0 0.09"
    scale="0.6 0.6 0.6">
  </a-text>
</a-box>

<!-- Navigation -->
<a-box
  class="clickable"
  position="0.8 0.35 0.15"
  depth="0.15"
  height="0.25"
  width="0.7"
  color="#d4af37"
  onclick="window.location.href='navigation.html';">

  <a-text value="Navigate"
    align="center"
    color="white"
    position="0 0 0.09"
    scale="0.6 0.6 0.6">
  </a-text>
</a-box>
        <!-- 3D FLOATING BUTTONS BELOW VIDEO -->

<!-- Unmute -->
<a-box
  class="clickable"
  position="-0.8 0.45 0.05"
  depth="0.12"
  height="0.25"
  width="0.6"
  color="#d4af37"
  animation="property: scale; dir: alternate; dur: 1200; loop: true; to: 1.05 1.05 1.05"
  onclick="document.querySelector('#wedding-video').muted=false;">

  <a-text value="Unmute"
    align="center"
    color="white"
    position="0 0 0.08"
    scale="0.6 0.6 0.6">
  </a-text>
</a-box>

<!-- Music -->
<a-box
  class="clickable"
  position="0 0.45 0.05"
  depth="0.12"
  height="0.25"
  width="0.6"
  color="#d4af37"
  onclick="var m=document.querySelector('#bg-music'); m.paused?m.play():m.pause();">

  <a-text value="Music"
    align="center"
    color="white"
    position="0 0 0.08"
    scale="0.6 0.6 0.6">
  </a-text>
</a-box>

<!-- Navigation -->
<a-box
  class="clickable"
  position="0.8 0.45 0.05"
  depth="0.12"
  height="0.25"
  width="0.7"
  color="#d4af37"
  onclick="window.location.href='navigation.html';">

  <a-text value="Navigate"
    align="center"
    color="white"
    position="0 0 0.08"
    scale="0.6 0.6 0.6">
  </a-text>
</a-box>

        <a-text value="Navigate"
          align="center"
          color="white"
          position="0 0 0.08"
          scale="0.6 0.6 0.6">
        </a-text>
      </a-box>

    </a-marker>

    <a-camera></a-camera>

  </a-scene>

</body>
</html>
