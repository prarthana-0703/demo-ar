<!DOCTYPE html>
<html>

<head>

<title>AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>

<script>

// Button interaction
AFRAME.registerComponent('button-logic', {
init:function(){

const el=this.el;

function handlePress(){

const id=el.getAttribute('id');

if(id==="navBtn"){
window.location.href="navigation.html";
}

if(id==="rsvpBtn"){
window.open("https://forms.gle/YOUR_FORM_LINK");
}

if(id==="galleryBtn"){
window.location.href="gallery.html";
}

}

el.addEventListener('click',handlePress);
el.addEventListener('touchstart',handlePress);

}
});


// Marker video control
AFRAME.registerComponent('marker-handler',{
init:function(){

const video=document.querySelector("#wedding-video");

this.el.addEventListener("markerFound",()=>{
video.play();
});

this.el.addEventListener("markerLost",()=>{
video.pause();
});

}
});


// Countdown Timer
window.onload=function(){

const weddingDate = new Date("Dec 25, 2026 18:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();
const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));

const countdown=document.querySelector("#countdown");

if(countdown){
countdown.setAttribute("value",days+" Days To Wedding");
}

},1000);

};

</script>

</head>

<body>

<a-scene
embedded
arjs="sourceType:webcam;debugUIEnabled:false;"
vr-mode-ui="enabled:false">

<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
preload="auto"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>

</a-assets>


<a-marker preset="hiro" marker-handler>

<!-- Couple Names -->

<a-text
value="Prarthana & Rahul"
position="0 2.2 0"
align="center"
color="#FFD700"
scale="1.3 1.3 1.3">
</a-text>


<!-- Wedding Date -->

<a-text
value="25 December 2026"
position="0 2.0 0"
align="center"
color="white"
scale="0.9 0.9 0.9">
</a-text>


<!-- Countdown -->

<a-text
id="countdown"
value="Loading..."
position="0 2.4 0"
align="center"
color="#ff69b4"
scale="0.9 0.9 0.9">
</a-text>


<!-- Rotating 3D Object -->

<a-entity
gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Duck/glTF/Duck.gltf"
position="0 1.7 0"
scale="0.35 0.35 0.35"
animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
</a-entity>


<!-- Wedding Video -->

<a-video
src="#wedding-video"
position="0 0.8 0"
rotation="-90 0 0"
width="1.8"
height="1.0">
</a-video>


<!-- Navigate Button -->

<a-box
id="navBtn"
button-logic
position="-1 0.5 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.25"
width="0.6"
color="#d4af37">

<a-text
value="Navigate"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- RSVP Button -->

<a-box
id="rsvpBtn"
button-logic
position="0 0.5 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.25"
width="0.6"
color="#ff69b4">

<a-text
value="RSVP"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- Gallery Button -->

<a-box
id="galleryBtn"
button-logic
position="1 0.5 0.8"
rotation="-90 0 0"
depth="0.1"
height="0.25"
width="0.6"
color="#9370DB">

<a-text
value="Gallery"
align="center"
position="0 0 0.06"
scale="0.4 0.4 0.4">
</a-text>

</a-box>


<!-- Flower Animation -->

<a-entity
particle-system="
preset:snow;
particleCount:200;
size:1;
color:#ff69b4,#ffd700,#ffffff">
</a-entity>


</a-marker>


<!-- Selfie Frame -->

<a-image
src="https://cdn.pixabay.com/photo/2017/01/31/21/23/frame-2028795_960_720.png"
position="0 0 -1"
scale="2 3 1">
</a-image>


<a-entity camera></a-entity>

</a-scene>

</body>
</html>
