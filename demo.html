<!DOCTYPE html>
<html>
<head>
  <title>AR Wedding Invitation</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #messageBox {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 20px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
    }
  </style>
</head>

<body>

<div id="messageBox">Scan your invitation...</div>

<a-scene embedded arjs>

  <!-- Marker (you can use QR or custom image) -->
  <a-marker preset="hiro" id="marker">

    <!-- 3D Text -->
    <a-text id="arText"
            value="Welcome!"
            position="0 0.5 0"
            align="center"
            color="yellow">
    </a-text>

    <!-- Simple Heart -->
    <a-sphere color="red" radius="0.2" position="0 0 0"></a-sphere>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  const messages = {
    "rahul": "Hey Rahul! 💍 You are invited to our wedding!",
    "priya": "Dear Priya ❤️ Please join our special day!",
    "family": "With love, we invite you to our wedding 🌸"
  };

  // Simulate name detection (replace later with real input)
  let detectedName = prompt("Enter your name (rahul/priya/family):");

  detectedName = detectedName ? detectedName.toLowerCase() : "guest";

  let msg = messages[detectedName] || "Welcome! You are invited 💖";

  document.getElementById("messageBox").innerText = msg;

  // Update AR text
  document.querySelector("#arText").setAttribute("value", msg);

</script>

</body>
</html>
