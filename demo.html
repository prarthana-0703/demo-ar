<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wedding Invitation AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #debug-console {
            position: absolute; top: 10px; left: 10px; 
            color: #0f0; font-family: monospace; font-size: 10px; 
            z-index: 999; background: rgba(0,0,0,0.5);
        }
        #btn-container {
            position: absolute; bottom: 30px; width: 100%; 
            text-align: center; z-index: 1000;
        }
        button {
            padding: 15px 30px; border-radius: 50px; border: none;
            background: #ff477e; color: white; font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="debug-console">Status: Waiting for user...</div>

    <div id="btn-container">
        <button id="start-btn">ACTIVATE CAMERA</button>
    </div>

    <a-scene embedded 
             vr-mode-ui="enabled: false"
             arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro">
            <a-entity position="0 1 0" 
                      animation="property: position; to: 0 1.2 0; dir: alternate; dur: 1000; loop: true; easing: easeInOutQuad">
                
                <a-text id="couple-msg"
                        value="Loading..."
                        align="center"
                        color="#FFD700"
                        scale="1.5 1.5 1.5">
                </a-text>

                <a-entity geometry="primitive: torusKnot; radius: 0.3; radiusTubular: 0.05"
                          position="0 -0.5 0"
                          material="color: #ff477e"
                          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const log = (msg) => { document.getElementById('debug-console').innerText += "\n> " + msg; };

        // 1. Set the Personalized Message
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || 'Guest';
        document.getElementById('couple-msg').setAttribute('value', `Welcome\n${name}!\n❤️`);

        // 2. The Interaction Trigger
        document.getElementById('start-btn').addEventListener('click', function() {
            log("Attempting to start camera...");
            this.style.display = 'none';
            
            // Force the video to play
            const scene = document.querySelector('a-scene');
            scene.play();

            // Check if camera is actually responding
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(() => log("Camera Access: SUCCESS"))
                .catch((err) => {
                    log("ERROR: " + err.name);
                    alert("Please allow camera permissions in your browser settings!");
                });
        });

        window.addEventListener('load', () => log("Scripts Loaded"));
    </script>
</body>
</html>
