<!DOCTYPE html>
<html>
<head>
<title>Premium AR Wedding Invitation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family: serif;
}

/* 2D MUSIC BUTTON */
#musicUI{
position:absolute;
top:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#FFD700;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 15px gold;
z-index:10;
cursor:pointer;
}

#musicUI img{
width:35px;
}
</style>

<script>

window.addEventListener("DOMContentLoaded",()=>{

const music=document.querySelector("#wedding-music");
const btn=document.querySelector("#musicUI");

btn.onclick=()=>{
if(music.paused){
music.play();
btn.style.background="#ff69b4";
}else{
music.pause();
btn.style.background="#FFD700";
}
}

});

</script>

</head>

<body>

<!-- 2D MUSIC BUTTON -->
<div id="musicUI">
<img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
arjs="sourceType:webcam;debugUIEnabled:false">

<a-assets>

<video
id="wedding-video"
src="GIF_Video_Generation_Successful.mp4"
loop
muted
playsinline
webkit-playsinline>
</video>

</a-assets>

<audio id="wedding-music" src="wedding-music.mp3"></audio>

<a-marker preset="hiro">

<!-- SOFT GOLD LIGHT -->
<a-light type="ambient" color="#ffffff" intensity="1"></a-light>
<a-light type="point" color="#FFD700" intensity="2" position="0 2 0"></a-light>


<!-- GOLD FRAME -->
<a-plane
position="0 0.05 0"
rotation="-90 0 0"
width="2.6"
height="1.6"
color="#FFD700"
material="wireframe:true">
</a-plane>


<!-- 3D NAME EFFECT -->
<a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">

<a-text
value="Prarthana & Rahul"
position="0 0.15 -1.2"
align="center"
color="#FFD700"
scale="1.4 1.4 1.4"
rotation="-90 0 0">
</a-text>

<!-- Shadow layer for depth -->
<a-text
value="Prarthana & Rahul"
position="0.02 0.15 -1.22"
align="center"
color="#5c3b00"
scale="1.4 1.4 1.4"
rotation="-90 0 0">
</a-text>

</a-entity>


<!-- VIDEO -->
<a-video
src="#wedding-video"
position="0 0.1 0"
rotation="-90 0 0"
width="2.3"
height="1.3">
</a-video>


<!-- SAVE THE DATE -->
<a-text
value="SAVE THE DATE"
position="0 0.2 1.1"
align="center"
color="#FFD700"
scale="0.8 0.8 0.8"
rotation="-90 0 0">
</a-text>


<!-- 3D DATE EFFECT -->
<a-text
value="25 December 2026"
position="0 0.2 1.4"
align="center"
color="white"
scale="1.1 1.1 1.1"
rotation="-90 0 0">
</a-text>

<a-text
value="25 December 2026"
position="0.02 0.2 1.38"
align="center"
color="#888"
scale="1.1 1.1 1.1"
rotation="-90 0 0">
</a-text>


<!-- GOLD RING -->
<a-torus
position="0 0.4 0"
radius="0.25"
radius-tubular="0.03"
color="#FFD700"
rotation="90 0 0"
animation="property: rotation; to: 90 360 0; loop: true; dur: 4000">
</a-torus>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
